# https://github.com/evilmartians/lefthook/blob/master/docs/configuration.md
# check working `lefthook run pre-commit`

pre-commit:
  parallel: true
  commands:
    typecheck:
      run: npm run lint:types
    lint:
      run: npm run lint:scripts
    markdown:
      run: npm run lint:md

commit-msg:
  parallel: false
  commands:
    commitlint:
      run: npx commitlint --edit
